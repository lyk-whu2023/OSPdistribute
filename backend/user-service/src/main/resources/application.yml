server:
  port: 8081

spring:
  application:
    name: user-service
  main:
    web-application-type: reactive
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        enabled: true
      config:
        server-addr: localhost:8848
        file-extension: yaml
        enabled: true
        shared-configs:
          - data-id: common-config.yaml
            refresh: true
    sentinel:
      transport:
        dashboard: localhost:8080
        port: 8719
      datasource:
        ds1:
          nacos:
            server-addr: localhost:8848
            dataId: ${spring.application.name}-sentinel.json
            groupId: DEFAULT_GROUP
            rule-type: flow
    seata:
      enabled: true
      application-id: ${spring.application.name}
      tx-service-group: default_tx_group
      service:
        vgroup-mapping:
          default_tx_group: default
        grouplist:
          default: localhost:8091
      config:
        type: nacos
        nacos:
          server-addr: localhost:8848
          group: SEATA_GROUP
          data-id: seataServer.properties
      registry:
        type: nacos
        nacos:
          server-addr: localhost:8848
          group: SEATA_GROUP
          namespace: 
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          time-between-eviction-runs: 60000ms
        shutdown-timeout: 100ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.shopping.user.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: YxtrduwQ7U2jEJMH96bgmyLvnP8e3qTNVaKSWFfRhDCcXkBz
  expiration: 86400000
  header: Authorization
  prefix: Bearer 