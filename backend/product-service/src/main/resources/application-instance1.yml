server:
  port: 8082

spring:
  application:
    name: product-service
  profiles:
    active: dev
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        server-addr: 172.28.197.47:8848
        enabled: true
        heartbeat-interval: 5000
        heartbeat-timeout: 15000
        ip-delete-timeout: 30000
        metadata:
          instance-id: product-service-1
          version: 1.0.0
          weight: 100
      config:
        server-addr: 172.28.197.47:8848
        file-extension: yaml
        enabled: true
        shared-configs:
          - data-id: common-config.yaml
            refresh: true
    sentinel:
      enabled: false
      transport:
        dashboard: 172.28.197.47:8080
        port: 8719
      datasource:
        ds1:
          nacos:
            server-addr: 172.28.197.47:8848
            dataId: ${spring.application.name}-sentinel.json
            groupId: DEFAULT_GROUP
            rule-type: flow
    seata:
      enabled: false
      application-id: ${spring.application.name}
      tx-service-group: default_tx_group
      service:
        vgroup-mapping:
          default_tx_group: default
        grouplist:
          default: 172.28.197.47:8091
      config:
        type: nacos
        nacos:
          server-addr: 172.28.197.47:8848
          group: SEATA_GROUP
          data-id: seataServer.properties
      registry:
        type: nacos
        nacos:
          server-addr: 172.28.197.47:8848
          group: SEATA_GROUP
          namespace: 
  datasource:
    url: jdbc:mysql://localhost:3306/product_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      keepalive-time: 30000
      connection-test-query: SELECT 1
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  data:
    redis:
      host: 172.28.197.47
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          time-between-eviction-runs: 60000ms
  kafka:
    bootstrap-servers: 172.28.197.47:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.shopping.product.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 负载均衡配置
spring.cloud.loadbalancer:
  retry:
    enabled: true
  cache:
    enabled: true
    ttl: 35s
    capacity: 256

# 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true
